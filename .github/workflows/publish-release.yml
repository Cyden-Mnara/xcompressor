name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-latest
          - name: macOS
            runner: macos-latest
          - name: Linux
            runner: ubuntu-22.04

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      XCOMPRESSOR_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
      XCOMPRESSOR_UPDATER_PUBKEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare bundled FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/resources/ffmpeg/windows | Out-Null
          Invoke-WebRequest "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-dist -Force
          $binDir = Get-ChildItem ffmpeg-dist | Select-Object -First 1 | ForEach-Object { Join-Path $_.FullName "bin" }
          Copy-Item (Join-Path $binDir "ffmpeg.exe") src-tauri/resources/ffmpeg/windows/ffmpeg.exe -Force
          Copy-Item (Join-Path $binDir "ffprobe.exe") src-tauri/resources/ffmpeg/windows/ffprobe.exe -Force

      - name: Prepare bundled FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src-tauri/resources/ffmpeg/macos
          curl -L "https://evermeet.cx/ffmpeg/getrelease/zip" -o ffmpeg.zip
          curl -L "https://evermeet.cx/ffprobe/getrelease/zip" -o ffprobe.zip
          unzip -o ffmpeg.zip -d ffmpeg-dist
          unzip -o ffprobe.zip -d ffprobe-dist
          cp ffmpeg-dist/ffmpeg src-tauri/resources/ffmpeg/macos/ffmpeg
          cp ffprobe-dist/ffprobe src-tauri/resources/ffmpeg/macos/ffprobe
          chmod +x src-tauri/resources/ffmpeg/macos/ffmpeg src-tauri/resources/ffmpeg/macos/ffprobe

      - name: Prepare bundled FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p src-tauri/resources/ffmpeg/linux
          curl -L "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" -o ffmpeg.tar.xz
          mkdir -p ffmpeg-dist
          tar -xf ffmpeg.tar.xz -C ffmpeg-dist --strip-components=1
          cp ffmpeg-dist/ffmpeg src-tauri/resources/ffmpeg/linux/ffmpeg
          cp ffmpeg-dist/ffprobe src-tauri/resources/ffmpeg/linux/ffprobe
          chmod +x src-tauri/resources/ffmpeg/linux/ffmpeg src-tauri/resources/ffmpeg/linux/ffprobe

      - name: Validate updater signing config
        shell: bash
        env:
          UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error title=Missing GitHub secret::Set TAURI_SIGNING_PRIVATE_KEY in repository secrets."
            exit 1
          fi

          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ]; then
            echo "::error title=Missing GitHub secret::Set TAURI_SIGNING_PRIVATE_KEY_PASSWORD in repository secrets."
            exit 1
          fi

          if [ -z "${UPDATER_PUBLIC_KEY}" ]; then
            echo "::error title=Missing GitHub variable::Set TAURI_UPDATER_PUBLIC_KEY in repository variables."
            exit 1
          fi

      - name: Publish Tauri release
        uses: tauri-apps/tauri-action@v0
        with:
          args: --config '{"bundle":{"createUpdaterArtifacts":true},"plugins":{"updater":{"pubkey":"${{ vars.TAURI_UPDATER_PUBLIC_KEY }}"}}}'
          tagName: ${{ github.ref_name }}
          releaseName: xcompressor ${{ github.ref_name }}
          releaseBody: Desktop release for ${{ github.ref_name }}.
          releaseDraft: false
          prerelease: false
